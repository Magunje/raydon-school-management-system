{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-4">{{ title }}</h4>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Employee *</label>
                        <select name="employee_id" class="form-select rounded-3" required>
                            <option value="">-- Choose Employee --</option>
                            {% for emp in employees %}
                            <option value="{{ emp.pk }}">{{ emp.full_name }} ({{ emp.employee_number }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Licence Number *</label>
                        <input type="text" name="licence_number" class="form-control rounded-3" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Licence Expiry *</label>
                            <input type="date" name="licence_expiry" class="form-control rounded-3" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Medical Expiry *</label>
                            <input type="date" name="medical_expiry" class="form-control rounded-3" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Assign Vehicle</label>
                        <select name="assigned_vehicle_id" class="form-select rounded-3">
                            <option value="">-- Unassigned --</option>
                            {% for veh in vehicles %}
                            <option value="{{ veh.pk }}">{{ veh.vehicle_name }} ({{ veh.registration_number }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-grow-1 rounded-3">Save Driver</button>
                        <a href="{% url 'driver_list' %}" class="btn btn-light rounded-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
