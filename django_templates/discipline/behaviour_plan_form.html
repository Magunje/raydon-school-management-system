{% extends "base.html" %}
{% block title %}Setup Behaviour Plan - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-3"><i class="bi bi-clipboard2-check me-2 text-success"></i>Setup Behaviour Improvement Plan</h4>
                <hr class="mb-4">

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Select Student <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose student...</option>
                                {% for stud in students %}
                                <option value="{{ stud.pk }}">{{ stud.full_name }} ({{ stud.admission_no }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Assigned Mentor <span class="text-danger">*</span></label>
                            <select name="mentor_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose mentor...</option>
                                {% for member in staff %}
                                <option value="{{ member.pk }}">{{ member.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Start Date</label>
                            <input type="date" name="start_date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-3" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Review Date <span class="text-danger">*</span></label>
                            <input type="date" name="review_date" class="form-control rounded-3" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Improvement Targets <span class="text-danger">*</span></label>
                            <textarea name="targets" rows="3" class="form-control rounded-3" placeholder="Define specific behavioural goals the student needs to achieve..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Plan Activities <span class="text-danger">*</span></label>
                            <textarea name="activities" rows="3" class="form-control rounded-3" placeholder="What support, sessions, or rules will be followed (e.g. daily warden check-in, weekly counsellor talk)..." required></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'discipline:dashboard' %}" class="btn btn-light rounded-3 px-4">Cancel</a>
                        <button type="submit" class="btn btn-success rounded-3 px-4">Create Behaviour Plan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
