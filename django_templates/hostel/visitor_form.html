{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 600px;">
    <div class="mb-4">
        <a href="{% url 'hostel_visitors' %}" class="btn btn-outline-secondary btn-sm rounded-3"><i class="bi bi-arrow-left me-1"></i> Back to Visitors</a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
        <h4 class="fw-bold text-dark mb-2">{{ title }}</h4>
        <p class="text-muted small border-bottom pb-3">Record check-in details. Generates gate pass with visitor ID and QR code.</p>

        <form method="post" class="mt-4 form-panel">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-12 col-sm-6">
                    <label class="form-label">Visitor Full Name <span class="text-danger">*</span></label>
                    <input type="text" name="visitor_name" class="form-control" placeholder="Enter full name" required>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">Contact / Phone Number <span class="text-danger">*</span></label>
                    <input type="text" name="contact_number" class="form-control" placeholder="e.g. +263771122334" required>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">Relationship to Pupil <span class="text-danger">*</span></label>
                    <select name="relationship" class="form-select bg-light" required>
                        <option value="Parent">Parent</option>
                        <option value="Guardian">Guardian</option>
                        <option value="Sibling">Sibling</option>
                        <option value="Uncle/Aunt">Uncle / Aunt</option>
                        <option value="Other">Other relative</option>
                    </select>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">Select Boarder Student <span class="text-danger">*</span></label>
                    <select name="student_id" class="form-select bg-light" required>
                        <option value="">-- Choose Student --</option>
                        {% for s in students %}
                        <option value="{{ s.pk }}">{{ s.first_name }} {{ s.surname }} ({{ s.admission_no }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex gap-2 justify-content-end">
                <a href="{% url 'hostel_visitors' %}" class="btn btn-outline-secondary rounded-3 px-4">Cancel</a>
                <button type="submit" class="btn btn-primary rounded-3 px-4">Approve Entry & Print Pass</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
