{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-4">{{ title }}</h4>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Asset Code *</label>
                            <input type="text" name="asset_code" class="form-control rounded-3" value="{{ asset.asset_code }}" required {% if asset %}readonly{% endif %} placeholder="e.g. AST-FUR-001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Asset Name *</label>
                            <input type="text" name="asset_name" class="form-control rounded-3" value="{{ asset.asset_name }}" required placeholder="e.g. Executive Desk Boardroom">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Category *</label>
                            <select name="category_id" class="form-select rounded-3" required {% if asset %}disabled{% endif %}>
                                <option value="">-- Choose Category --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.pk }}" {% if asset.category_id == cat.pk %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Serial Number</label>
                            <input type="text" name="serial_number" class="form-control rounded-3" value="{{ asset.serial_number }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" rows="3" class="form-control rounded-3" placeholder="Additional specifications, dimensions, features...">{{ asset.description }}</textarea>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Acquisition Date *</label>
                            <input type="date" name="acquisition_date" class="form-control rounded-3" value="{{ asset.acquisition_date|date:'Y-m-d'|default:today }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Purchase Cost ($) *</label>
                            <input type="number" step="0.01" name="purchase_price" class="form-control rounded-3" value="{{ asset.purchase_price|default:'0.00' }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Supplier Name</label>
                            <input type="text" name="supplier" class="form-control rounded-3" value="{{ asset.supplier }}">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Warranty Start Date</label>
                            <input type="date" name="warranty_start" class="form-control rounded-3" value="{{ asset.warranty_start|date:'Y-m-d' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Warranty End Date</label>
                            <input type="date" name="warranty_end" class="form-control rounded-3" value="{{ asset.warranty_end|date:'Y-m-d' }}">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Useful Life (Years) *</label>
                            <input type="number" name="useful_life" class="form-control rounded-3" value="{{ asset.useful_life|default:5 }}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Depreciation Method</label>
                            <select name="depreciation_method" class="form-select rounded-3">
                                <option value="Straight-Line" {% if asset.depreciation_method == "Straight-Line" %}selected{% endif %}>Straight-Line</option>
                                <option value="Reducing Balance" {% if asset.depreciation_method == "Reducing Balance" %}selected{% endif %}>Reducing Balance</option>
                                <option value="None" {% if asset.depreciation_method == "None" %}selected{% endif %}>None</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Depreciation Rate (%)</label>
                            <input type="number" step="0.01" name="depreciation_rate" class="form-control rounded-3" value="{{ asset.depreciation_rate|default:'0.00' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Salvage Value ($)</label>
                            <input type="number" step="0.01" name="salvage_value" class="form-control rounded-3" value="{{ asset.salvage_value|default:'0.00' }}">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Default Room/Location</label>
                            <input type="text" name="location_name" class="form-control rounded-3" value="{{ asset.location_name }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Custodian / Owner</label>
                            <select name="custodian_id" class="form-select rounded-3">
                                <option value="">-- Choose Employee --</option>
                                {% for c in custodians %}
                                <option value="{{ c.pk }}" {% if asset.custodian_id == c.pk %}selected{% endif %}>{{ c.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    {% if asset %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Asset Condition Status</label>
                        <select name="status" class="form-select rounded-3">
                            <option value="Active" {% if asset.status == "Active" %}selected{% endif %}>Active</option>
                            <option value="In Use" {% if asset.status == "In Use" %}selected{% endif %}>In Use</option>
                            <option value="In Storage" {% if asset.status == "In Storage" %}selected{% endif %}>In Storage</option>
                            <option value="Under Maintenance" {% if asset.status == "Under Maintenance" %}selected{% endif %}>Under Maintenance</option>
                            <option value="Damaged" {% if asset.status == "Damaged" %}selected{% endif %}>Damaged</option>
                            <option value="Lost" {% if asset.status == "Lost" %}selected{% endif %}>Lost</option>
                        </select>
                    </div>
                    {% endif %}

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-grow-1 rounded-3">Save Asset Details</button>
                        <a href="{% url 'asset_list' %}" class="btn btn-light rounded-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
