{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-4">{{ title }}</h4>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Asset *</label>
                        <select name="asset_id" class="form-select rounded-3 select2" required>
                            <option value="">-- Choose Asset --</option>
                            {% for asset in assets %}
                            <option value="{{ asset.pk }}">{{ asset.asset_code }} - {{ asset.asset_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Assign to Employee / Custodian</label>
                        <select name="assigned_employee_id" class="form-select rounded-3">
                            <option value="">-- Optional --</option>
                            {% for emp in employees %}
                            <option value="{{ emp.pk }}">{{ emp.full_name }} ({{ emp.employee_number }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Assigned Department</label>
                            <input type="text" name="assigned_department" class="form-control rounded-3" placeholder="e.g. Administration">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Room / Location Location</label>
                            <input type="text" name="assigned_location" class="form-control rounded-3" placeholder="e.g. Classroom 3B">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Assignment Date *</label>
                            <input type="date" name="date_assigned" class="form-control rounded-3" value="{{ today }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Initial Asset Condition</label>
                            <select name="condition" class="form-select rounded-3">
                                <option value="Good">Good</option>
                                <option value="Fair">Fair</option>
                                <option value="New">New</option>
                                <option value="Needs Repair">Needs Repair</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Assignment Notes</label>
                        <textarea name="notes" rows="2" class="form-control rounded-3" placeholder="Checked out for remote learning. To associate student directly, input admission no here..."></textarea>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-grow-1 rounded-3">Assign Custody</button>
                        <a href="{% url 'asset_list' %}" class="btn btn-light rounded-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
