{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-4">{{ title }}</h4>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Route Code *</label>
                        <input type="text" name="route_code" class="form-control rounded-3" value="{{ route.route_code }}" required {% if route %}readonly{% endif %} placeholder="e.g. RT-NORTH">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Route Name *</label>
                        <input type="text" name="route_name" class="form-control rounded-3" value="{{ route.route_name }}" required placeholder="e.g. Northern Suburbs Shuttle">
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Starting Point *</label>
                            <input type="text" name="starting_point" class="form-control rounded-3" value="{{ route.starting_point }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Destination *</label>
                            <input type="text" name="destination" class="form-control rounded-3" value="{{ route.destination }}" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Distance (KM) *</label>
                            <input type="number" step="0.1" name="distance" class="form-control rounded-3" value="{{ route.distance|default:'0.0' }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Est. Duration</label>
                            <input type="text" name="estimated_duration" class="form-control rounded-3" value="{{ route.estimated_duration }}" placeholder="e.g. 45 mins">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Assign Vehicle</label>
                        <select name="assigned_vehicle_id" class="form-select rounded-3">
                            <option value="">-- Choose Vehicle --</option>
                            {% for veh in vehicles %}
                            <option value="{{ veh.pk }}" {% if route.assigned_vehicle_id == veh.pk %}selected{% endif %}>{{ veh.vehicle_name }} ({{ veh.registration_number }} - {{ veh.capacity }} seats)</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Assign Driver</label>
                        <select name="assigned_driver_id" class="form-select rounded-3">
                            <option value="">-- Choose Driver --</option>
                            {% for drv in drivers %}
                            <option value="{{ drv.pk }}" {% if route.assigned_driver_id == drv.pk %}selected{% endif %}>{{ drv.employee.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    {% if route %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Status</label>
                        <select name="status" class="form-select rounded-3">
                            <option value="Active" {% if route.status == "Active" %}selected{% endif %}>Active</option>
                            <option value="Inactive" {% if route.status == "Inactive" %}selected{% endif %}>Inactive</option>
                        </select>
                    </div>
                    {% endif %}

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-grow-1 rounded-3">Save Route</button>
                        <a href="{% url 'route_list' %}" class="btn btn-light rounded-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
