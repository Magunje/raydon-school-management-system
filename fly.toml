app = "raydon-school-system"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8005"
  RAYDON_DATA_DIR = "/data"
  TIME_ZONE = "Africa/Harare"
  ALLOWED_HOSTS = "raydon-school-system.fly.dev,localhost,127.0.0.1"
  CSRF_TRUSTED_ORIGINS = "https://raydon-school-system.fly.dev"

[[mounts]]
  source = "school_data"
  destination = "/data"

[http_service]
  internal_port = 8005
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
