{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 650px;">
    <div class="mb-4">
        <a href="{% url 'hostel_discipline' %}" class="btn btn-outline-secondary btn-sm rounded-3"><i class="bi bi-arrow-left me-1"></i> Back to Incidents</a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
        <h4 class="fw-bold text-dark mb-2">{{ title }}</h4>
        <p class="text-muted small border-bottom pb-3">Provide incident details. Saving this form triggers SMS/portal notifications to parents.</p>

        <form method="post" class="mt-4 form-panel">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Select Student <span class="text-danger">*</span></label>
                    <select name="student_id" class="form-select bg-light" required>
                        <option value="">-- Choose Pupil --</option>
                        {% for s in students %}
                        <option value="{{ s.pk }}">{{ s.first_name }} {{ s.surname }} ({{ s.admission_no }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">Incident Date <span class="text-danger">*</span></label>
                    <input type="date" name="incident_date" class="form-control" value="{{ today }}" required>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">Action Taken <span class="text-danger">*</span></label>
                    <select name="action_taken" class="form-select bg-light" required>
                        <option value="Written Warning">Written Warning</option>
                        <option value="Hostel Detention">Hostel Detention</option>
                        <option value="Suspension of Residency">Suspension of Residency</option>
                        <option value="Expulsion from Boarding">Expulsion from Boarding</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Incident Violation Description <span class="text-danger">*</span></label>
                    <textarea name="description" rows="4" class="form-control" placeholder="Provide complete facts of the incident..." required></textarea>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex gap-2 justify-content-end">
                <a href="{% url 'hostel_discipline' %}" class="btn btn-outline-secondary rounded-3 px-4">Cancel</a>
                <button type="submit" class="btn btn-primary rounded-3 px-4">Save & Notify Parent</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
