{% extends "base.html" %}

{% block title %}Edit Receipt - {{ app_title }}{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h1 class="h3 mb-1">Edit Receipt</h1>
        <p class="text-secondary mb-0">{{ payment.receipt_no }} | {{ pupil.admission_no }} | audit reason required</p>
    </div>
    <a class="btn btn-outline-secondary" href="/receipt/{{ payment.receipt_no }}"><i class="bi bi-arrow-left"></i> Back to Receipt</a>
</div>

<section class="panel form-panel">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label>Admission Number</label>
                <input value="{{ pupil.admission_no }}" readonly>
            </div>
            <div class="col-md-6">
                <label>Student</label>
                <input value="{{ pupil.first_name }} {{ pupil.surname }}" readonly>
            </div>
            <div class="col-md-6">
                <label for="amount_paid">Amount Paid</label>
                <input id="amount_paid" name="amount_paid" type="number" step="0.01" min="0.01" value="{{ payment.amount_paid }}" required>
            </div>
            <div class="col-md-6">
                <label for="payment_date">Payment Date</label>
                <input id="payment_date" name="payment_date" type="date" value="{{ payment.payment_date }}" required>
            </div>
            <div class="col-md-6">
                <label for="payment_method">Payment Method</label>
                <input id="payment_method" name="payment_method" value="{{ payment.payment_method }}" required>
            </div>
            <div class="col-md-3">
                <label for="term">Term</label>
                <input id="term" name="term" value="{{ payment.term }}" required>
            </div>
            <div class="col-md-3">
                <label for="year">Year</label>
                <input id="year" name="year" type="number" value="{{ payment.year }}" required>
            </div>
            <div class="col-md-6">
                <label for="reference_no">Reference Number</label>
                <input id="reference_no" name="reference_no" value="{{ payment.reference_no|default:'' }}">
            </div>
            <div class="col-12">
                <label for="edit_reason">Reason for Edit</label>
                <textarea id="edit_reason" name="edit_reason" rows="3" required placeholder="Explain why this receipt is being changed"></textarea>
            </div>
        </div>
        <div class="d-flex justify-content-end mt-4">
            <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save Audited Edit</button>
        </div>
    </form>
</section>
{% endblock %}
