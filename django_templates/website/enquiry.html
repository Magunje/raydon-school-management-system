{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Online Enquiry | {{ settings.school_name|default:"RAYDON SCHOOL" }}</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --brand-primary: #0f766e;
            --brand-hover: #115e59;
            --brand-light: #f0fdfa;
            --brand-secondary: #d97706;
            --brand-dark: #111827;
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        
        body {
            font-family: var(--font-body);
            color: var(--text-dark);
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .enquiry-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        
        .enquiry-header {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-hover));
            color: #ffffff;
            padding: 2.5rem;
            text-align: center;
        }
        
        .enquiry-body {
            padding: 2.5rem;
        }
        
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
        }
        
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border-color: var(--border-color);
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.15);
        }
    </style>
</head>
<body>

<div class="enquiry-card">
    <div class="enquiry-header">
        <i class="bi bi-chat-left-text-fill text-white fs-1 mb-2 d-block"></i>
        <h1 class="h3 fw-bold mb-1" style="font-family: var(--font-display);">Online Enquiry Desk</h1>
        <p class="mb-0 text-white-50 small">Submit your questions directly to the registrar</p>
    </div>
    
    <div class="enquiry-body">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} rounded-3">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input class="form-control" name="name" placeholder="e.g. Tendai Moyo" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input class="form-control" name="phone" placeholder="e.g. +263 777 921 440">
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input class="form-control" name="email" type="email" placeholder="e.g. tendai@gmail.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Your Message</label>
                <textarea class="form-control" name="message" rows="5" placeholder="Specify your questions or enrolment enquiries here..." required></textarea>
            </div>
            
            <div class="d-flex align-items-center justify-content-between mt-4">
                <a class="btn btn-link text-decoration-none text-teal p-0 fw-semibold" href="/"><i class="bi bi-arrow-left"></i> Back to Home</a>
                <button class="btn btn-primary px-4 py-2" type="submit">Submit Enquiry</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
