{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-4">{{ title }}</h4>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Pickup Location *</label>
                        <input type="text" name="location_name" class="form-control rounded-3" required placeholder="e.g. Corner 4th and Central Ave">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Pickup Time *</label>
                        <input type="time" name="pickup_time" class="form-control rounded-3" required>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-grow-1 rounded-3">Save Pickup Stop</button>
                        <a href="{% url 'pickup_point_list' route.pk %}" class="btn btn-light rounded-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
