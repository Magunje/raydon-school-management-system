{% extends "base.html" %}
{% block title %}Log Parent Meeting - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-3"><i class="bi bi-people me-2 text-primary"></i>Record Disciplinary Parent Meeting</h4>
                <hr class="mb-4">

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Select Student <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose student...</option>
                                {% for stud in students %}
                                <option value="{{ stud.pk }}">{{ stud.full_name }} ({{ stud.admission_no }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Related Incident (Optional)</label>
                            <select name="incident_id" class="form-select rounded-3">
                                <option value="">None / General Review</option>
                                {% for inc in incidents %}
                                <option value="{{ inc.pk }}">{{ inc.incident_no }} - {{ inc.student.full_name }} ({{ inc.category.name }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Meeting Date</label>
                            <input type="date" name="date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-3" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Participants <span class="text-danger">*</span></label>
                            <textarea name="participants" rows="2" class="form-control rounded-3" placeholder="E.g., Mrs. Banda (Mother), Mr. Moyo (Deputy Head), Mr. Tembo (Class Teacher)..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Meeting Minutes / Discussion <span class="text-danger">*</span></label>
                            <textarea name="minutes" rows="5" class="form-control rounded-3" placeholder="Detailed notes about what was discussed, claims made, and responses..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Outcomes & Decisions <span class="text-danger">*</span></label>
                            <textarea name="outcomes" rows="3" class="form-control rounded-3" placeholder="E.g., Behaviour Improvement Plan agreed upon, warning issued, 2 weeks suspension confirmed..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Follow-Up Actions</label>
                            <textarea name="follow_up_actions" rows="2" class="form-control rounded-3" placeholder="E.g., Weekly follow-ups with the mentor, review meeting scheduled for next term..."></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'discipline:dashboard' %}" class="btn btn-light rounded-3 px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-3 px-4">Log Parent Meeting</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
