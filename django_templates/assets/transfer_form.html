{% extends "base.html" %}
{% block title %}{{ title }} - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-4">{{ title }}</h4>
                <div class="alert alert-light border rounded-3 mb-4">
                    <div class="small text-muted">Asset Code:</div>
                    <div class="fw-bold text-dark mb-2">{{ asset.asset_code }}</div>
                    <div class="small text-muted">Current Location:</div>
                    <div class="fw-semibold text-dark">{{ asset.location_name|default:"Unassigned" }}</div>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Room / Location *</label>
                        <input type="text" name="new_location" class="form-control rounded-3" required placeholder="e.g. Science Lab B">
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Transfer Date *</label>
                            <input type="date" name="transfer_date" class="form-control rounded-3" value="{{ today }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Authorized By *</label>
                            <select name="approved_by_id" class="form-select rounded-3" required>
                                <option value="">-- Select Authority --</option>
                                {% for app in approvers %}
                                <option value="{{ app.pk }}">{{ app.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Reason for Transfer *</label>
                        <textarea name="reason" rows="3" class="form-control rounded-3" required placeholder="e.g. Room reallocation for high school exams."></textarea>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-grow-1 rounded-3">Execute Transfer</button>
                        <a href="{% url 'asset_list' %}" class="btn btn-light rounded-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
