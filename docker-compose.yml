version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: raydon_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-raydon_school}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: raydon_web
    restart: always
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 school_project.wsgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/uploads
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-1234}@db:5432/${DB_NAME:-raydon_school}
      - DEBUG=False
      - ENV=production
      - SECRET_KEY=${SECRET_KEY:-local-development-only-change-this-key-before-production-2026}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,.localhost,saas.localhost}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: raydon_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/uploads:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
