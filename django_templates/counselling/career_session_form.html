{% extends "base.html" %}
{% block title %}Record Career Guidance - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-3"><i class="bi bi-mortarboard me-2 text-primary"></i>Record Career Guidance Profile</h4>
                <hr class="mb-4">

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Select Student <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose student...</option>
                                {% for stud in students %}
                                <option value="{{ stud.pk }}">{{ stud.full_name }} ({{ stud.admission_no }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Assigned Counsellor <span class="text-danger">*</span></label>
                            <select name="counsellor_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose counsellor...</option>
                                {% for member in staff %}
                                <option value="{{ member.pk }}">{{ member.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Date</label>
                            <input type="date" name="date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-3">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Career Interests & Pathways <span class="text-danger">*</span></label>
                            <textarea name="career_interests" rows="3" class="form-control rounded-3" placeholder="Describe the student's target profession, industry interests, and goals..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">University Selection & Combinations</label>
                            <textarea name="university_info" rows="2" class="form-control rounded-3" placeholder="E.g., Target universities, degree options (Computer Science, Medicine), required subject combinations..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Scholarship Information</label>
                            <textarea name="scholarship_info" rows="2" class="form-control rounded-3" placeholder="Details of scholarship eligibility, applications started, or recommendations..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Assessment Notes & Comments</label>
                            <textarea name="assessment_notes" rows="3" class="form-control rounded-3" placeholder="Counsellor review comments, career aptitude observations, next actions..."></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'counselling:dashboard' %}" class="btn btn-light rounded-3 px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-3 px-4">Record Guidance Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
