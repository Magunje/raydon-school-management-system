{% extends "base.html" %}
{% block title %}Record Incident - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-3"><i class="bi bi-shield-exclamation me-2 text-danger"></i>Log Incident Report</h4>
                <hr class="mb-4">

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Select Student <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose student...</option>
                                {% for stud in students %}
                                <option value="{{ stud.pk }}">{{ stud.full_name }} ({{ stud.admission_no }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Offence Category <span class="text-danger">*</span></label>
                            <select name="category_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose category...</option>
                                {% for cat in categories %}
                                <option value="{{ cat.pk }}">{{ cat.name }} ({{ cat.severity }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Incident Date</label>
                            <input type="date" name="incident_date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-3">
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Incident Time</label>
                            <input type="time" name="incident_time" class="form-control rounded-3">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Reported By</label>
                            <select name="reported_by_id" class="form-select rounded-3">
                                <option value="">Choose staff member...</option>
                                {% for member in staff %}
                                <option value="{{ member.pk }}">{{ member.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Incident Description <span class="text-danger">*</span></label>
                            <textarea name="description" rows="4" class="form-control rounded-3" placeholder="Provide a detailed description of the incident, facts observed, and context..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Witnesses</label>
                            <textarea name="witnesses" rows="2" class="form-control rounded-3" placeholder="Names of any students, staff, or others who witnessed the incident..."></textarea>
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch py-2">
                                <input class="form-check-input" type="checkbox" name="hostel_incident" id="hostelIncident">
                                <label class="form-check-label fw-semibold" for="hostelIncident">Is this a Hostel Incident?</label>
                                <div class="text-muted small">Checking this will automatically flag the incident as originating from the boarding dormitories.</div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'discipline:incident_list' %}" class="btn btn-light rounded-3 px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger rounded-3 px-4">Save Incident Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
