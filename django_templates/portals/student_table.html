{% extends "base.html" %}

{% block content %}
<div class="page-title"><div><h1 class="h3 mb-1">{{ title }}</h1><p class="text-secondary mb-0">{{ pupil.first_name }} {{ pupil.surname }}</p></div></div>
<section class="panel">
    <div class="table-responsive">
        <table class="table table-hover">
            <tbody>
            {% for row in rows %}
            <tr>{% for key, value in row.items %}<td><small class="text-secondary">{{ key|title }}</small><br>{{ value|default:"-" }}</td>{% endfor %}</tr>
            {% empty %}
            <tr><td class="text-secondary">No records found.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
