{% extends "student_portal/base_auth.html" %}
{% load static %}

{% block auth_content %}
<section class="auth-panel p-4">
    <div class="text-center mb-4">
        <img src="{% static 'img/raydon-system-logo.svg' %}" alt="{{ school_name }}" style="width:64px;height:64px">
        <h1 class="h4 mt-3 mb-1">Student Portal</h1>
        <p class="text-secondary mb-0">{{ school_name }}</p>
    </div>
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    <form method="post" class="form-panel">
        {% csrf_token %}
        <div class="mb-3">
            <label for="admission_no">Admission number, username, or email</label>
            <input id="admission_no" name="admission_no" autocomplete="username" required>
        </div>
        <div class="mb-3">
            <label for="date_of_birth">Date of birth</label>
            <input id="date_of_birth" name="date_of_birth" type="date" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
    <div class="d-flex justify-content-between small mt-3">
        <a href="/">Support</a>
        <a href="/">Help</a>
    </div>
</section>
{% endblock %}
