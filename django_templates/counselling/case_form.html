{% extends "base.html" %}
{% block title %}Open Counselling Case - {{ school_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
                <h4 class="fw-bold text-dark mb-3"><i class="bi bi-folder-plus me-2 text-success"></i>Open Counselling Case</h4>
                <hr class="mb-4">

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Select Student <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose student...</option>
                                {% for stud in students %}
                                <option value="{{ stud.pk }}">{{ stud.full_name }} ({{ stud.admission_no }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Counselling Category <span class="text-danger">*</span></label>
                            <select name="category" class="form-select rounded-3" required>
                                <option value="" disabled selected>Choose category...</option>
                                <option value="Academic">Academic Counselling</option>
                                <option value="Behavioural">Behavioural Counselling</option>
                                <option value="Personal">Personal Counselling</option>
                                <option value="Career">Career Guidance</option>
                                <option value="Social">Social Counselling</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Risk Severity Level <span class="text-danger">*</span></label>
                            <select name="severity_level" class="form-select rounded-3" required>
                                <option value="Low">Low Risk</option>
                                <option value="Medium" selected>Medium Risk</option>
                                <option value="High">High Risk</option>
                                <option value="Critical">Critical Risk</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Assigned Counsellor</label>
                            <select name="assigned_counsellor_id" class="form-select rounded-3">
                                <option value="">Choose counsellor...</option>
                                {% for member in staff %}
                                <option value="{{ member.pk }}">{{ member.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Opening Date</label>
                            <input type="date" name="date_opened" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-3">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Case Description / Referral Reason <span class="text-danger">*</span></label>
                            <textarea name="description" rows="5" class="form-control rounded-3" placeholder="Provide background on the referral, observed issues, psychological or academic indicators..." required></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'counselling:case_list' %}" class="btn btn-light rounded-3 px-4">Cancel</a>
                        <button type="submit" class="btn btn-success rounded-3 px-4">Open Case</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
