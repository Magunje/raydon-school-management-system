{% extends "base.html" %}

{% block title %}Generate Master Receipt - {{ app_title }}{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h1 class="h3 mb-1">Generate Master Receipt</h1>
        <p class="text-secondary mb-0">Batch unbatched fees or POS receipts by date for handover.</p>
    </div>
    <a class="btn btn-outline-secondary" href="/master-receipts"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<section class="panel form-panel">
    <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-4">
            <label for="batch_date">Receipt Date</label>
            <input id="batch_date" name="batch_date" type="date" value="{{ today }}" required>
        </div>
        <div class="col-md-4">
            <label for="receipt_type">Receipt Type</label>
            <select id="receipt_type" name="receipt_type" required>
                {% for type in receipt_types %}
                <option value="{{ type }}">{{ type }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-12">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Handover notes"></textarea>
        </div>
        <div class="col-12 d-flex justify-content-end">
            <button class="btn btn-primary" type="submit"><i class="bi bi-receipt-cutoff"></i> Generate</button>
        </div>
    </form>
</section>
{% endblock %}
